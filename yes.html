<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She said YES!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="proposal-bgm" autoplay loop>
        <source src="bgm.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="container">
        <h1>I love you, Nithya! ❤️</h1>
        <p>Here is to a lifetime of us.</p>
        
        <div class="photo-gallery">
            <img src="pic1.jpg" alt="Us 1" class="memory-pic">
            <img src="pic2.jpg" alt="Us 2" class="memory-pic">
            <img src="pic3.jpg" alt="Us 3" class="memory-pic">
            <img src="pic4.jpg" alt="Us 4" class="memory-pic">
        </div>
    </div>

    <h2 id="final-message" class="hidden-message">I can't wait to spend forever with you! ❤️</h2>

   <script>
        window.onload = function() {
            // 1. Play the background music automatically
            document.getElementById("proposal-bgm").play();
            
            // 2. The countdown for the final message
            // Calculate this based on your last photo. 
            // If your last photo animation starts at 8.5s, wait until around 10.5 seconds to show the text.
            // 10.5 seconds = 10500 milliseconds.
            
            setTimeout(() => {
                document.getElementById("final-message").classList.add("show-message");
            }, 10500); 
        }
    </script>
